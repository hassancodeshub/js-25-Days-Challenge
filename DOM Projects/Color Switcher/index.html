<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Switcher</title>
    <style>
        body {
        margin: auto;
      }
      .box {
        height: 200px;
        margin: 20px;
        padding: 10px;
        border: 1px solid black;
        color: white;
      }
      .container{
        width: 450px;
        margin : 0 auto;
      }
    </style>
  </head>
  <body>
    <h1 style="text-align: center">Color Switcher</h1>
    <div class="container">
        <span class="box" id="Blue" style="background-color: Blue">Blue</span>
      <span class="box" id="Red" style="background-color: red">Red</span>
      <span class="box" id="Green" style="background-color: green">Green</span>
      <span class="box" id="Purple" style="background-color: purple">Purple</span>
    </div>
    <h6 style="text-align: center">Try clicking on the box to change the background colour!</h1>
  </body>
  <script src="script.js"></script>
</html>
