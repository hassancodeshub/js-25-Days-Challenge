<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React</title>
</head>
<body>
    <button>Button Clicked</button>

    <script>
        class React {
            constructor() {
                this.library = "React";
                this.server = "https://localhost:3000";
                
                // Requirement: Getting the reference to the button and handling click
                document
                    .querySelector('button')
                    .addEventListener('click', this.handleClick.bind(this)); 
                    // .bind(this) attaches the class's 'this' context instead of the button's
            }

            handleClick() {
                console.log("button clicked");
                console.log(this);        // Logs the class context (React) instead of the <button>
                console.log(this.server); // Correctly logs "https://localhost:3000"
            }
        }

        const app = new React(); // Instantiating the object
    </script>
</body>
</html>
